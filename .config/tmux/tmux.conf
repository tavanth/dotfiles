set -a terminal-features "tmux-256color:RGB"

set -g prefix C-SPACE
set -g renumber-windows on
set -g mode-keys vi
set -g status-position bottom
set -g mouse on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'niksingh710/minimal-tmux-status'

bind \| split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

set -g status-right '#[bg=default]%Y-%m-%d %H:%M '

if-shell '[ "$ITERM_PROFILE" = "Kanso Pearl" ]' \
  'source-file ~/.config/tmux/themes/kanso-pearl.tmux' \
  'source-file ~/.config/tmux/themes/kanso-ink.tmux'

run '~/.tmux/plugins/tpm/tpm'
set -g status-justify left

